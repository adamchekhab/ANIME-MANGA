<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.06);
    --accent: #e8c97e;
    --accent2: #c4a55a;
    --text: #e8e6e0;
    --muted: #6b6a72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 40% at 80% 20%, rgba(232,201,126,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 80%, rgba(100,80,160,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }
  header {
    padding: 60px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 48px;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  h1 { font-family: 'Shippori Mincho', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  h1 span { color: var(--accent); }
  .subtitle { margin-top: 8px; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .count { font-family: 'Shippori Mincho', serif; font-size: 2.2rem; font-weight: 600; color: var(--accent); line-height: 1; text-align: right; }
  .count-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; text-align: right; }
  .topbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 11px 16px 11px 42px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
    font-weight: 300; border-radius: 8px; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: rgba(232,201,126,0.3); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; pointer-events: none; }
  .add-btn {
    background: transparent; border: 1px solid rgba(232,201,126,0.4); color: var(--accent);
    padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    border-radius: 8px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .add-btn:hover { background: rgba(232,201,126,0.08); }
  .progress-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; min-height: 18px; }
  .progress-bar-wrap { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 32px; overflow: hidden; opacity: 0; transition: opacity 0.3s; }
  .progress-bar-wrap.visible { opacity: 1; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; padding-bottom: 80px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .card:hover { transform: translateY(-3px); border-color: rgba(232,201,126,0.18); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
  .card-img { width: 100%; aspect-ratio: 3/4; position: relative; overflow: hidden; background: var(--surface2); }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
  .card:hover .card-img img { transform: scale(1.04); }
  .placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, var(--surface2) 0%, #12121c 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  }
  .spin { font-size: 1.4rem; color: var(--muted); opacity: 0.4; animation: spin 1.5s linear infinite; }
  .ph-icon { font-size: 1.6rem; color: var(--muted); opacity: 0.25; display: none; }
  .ph-text { font-size: 0.68rem; color: var(--muted); opacity: 0.5; letter-spacing: 0.04em; display: none; }
  .placeholder.no-image .spin { display: none; }
  .placeholder.no-image .ph-icon { display: block; }
  .placeholder.no-image .ph-text { display: block; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .card-overlay {
    position: absolute; inset: 0; background: rgba(10,10,15,0.82);
    display: flex; align-items: center; justify-content: center; gap: 12px;
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover .card-overlay { opacity: 1; }
  .ov-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05); color: var(--text); font-size: 0.85rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s; backdrop-filter: blur(4px);
  }
  .ov-btn.photo:hover { background: rgba(232,201,126,0.15); border-color: rgba(232,201,126,0.4); color: var(--accent); }
  .ov-btn.del:hover   { background: rgba(220,60,60,0.2); border-color: rgba(220,60,60,0.4); color: #f87171; }
  .card-info { padding: 11px 12px; }
  .card-title { font-family: 'Shippori Mincho', serif; font-size: 0.88rem; font-weight: 600; line-height: 1.35; }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(6px);
    z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-bg.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 32px; width: 100%; max-width: 400px; transform: translateY(10px); transition: transform 0.2s; }
  .modal-bg.open .modal { transform: translateY(0); }
  .modal h2 { font-family: 'Shippori Mincho', serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 22px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .field input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 300;
    border-radius: 8px; outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: rgba(232,201,126,0.3); }
  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-ok { flex: 1; background: var(--accent); color: #0a0a0f; border: none; padding: 11px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
  .btn-ok:hover { background: var(--accent2); }
  .btn-no { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 11px 18px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .btn-no:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .or-sep { text-align: center; color: var(--muted); font-size: 0.78rem; margin: 10px 0; }
  .file-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .file-btn:hover { border-color: rgba(232,201,126,0.3); color: var(--text); }
  #fileInput { display: none; }
  .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); font-size: 0.875rem; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>

<div class="container">
  <header>
    <div>
      <h1>Ma <span>Bibliothèque</span></h1>
      <p class="subtitle">Animés · Mangas · Films</p>
    </div>

</div>

<div class="modal-bg" id="addModal">

    <div class="field"><label>Titre</label><input type="text" id="newTitle" placeholder="Ex: Frieren"></div>
    <div class="modal-actions">
      <button class="btn-no" id="cancelAdd">Annuler</button>
      <button class="btn-ok" id="confirmAdd">Ajouter</button>
    </div>
  </div>
</div>

<!-- Photo Modal -->
<div class="modal-bg" id="photoModal">

    <h2>Modifier la photo</h2>
    <div class="field"><label>URL de l'image</label><input type="text" id="photoUrl" placeholder="https://…"></div>
    <div class="or-sep">— ou —</div>
    <button class="file-btn" id="triggerFile">📁 Choisir un fichier local</button>
    <input type="file" id="fileInput" accept="image/*">
    <div class="modal-actions">
      <button class="btn-no" id="cancelPhoto">Annuler</button>
      <button class="btn-ok" id="confirmPhoto">Appliquer</button>
    </div>
  </div>
</div>

let lib = [], nextId = 1, photoTarget = null, pendingFile = null;
let fetchQueue = [], fetching = false, fetchedCount = 0, totalToFetch = 0;

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) { const d = JSON.parse(s); lib = d.lib; nextId = d.nextId; return; }
  } catch(e) {}
  lib = MASTER.map((m, i) => ({
    id: i + 1,
    title: m[0],
    query: m[1],
    type: m[2],
    image: null
  }));
  nextId = lib.length + 1;
}

function save() { localStorage.setItem(KEY, JSON.stringify({ lib, nextId })); }

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function fetchCover(query, type) {
  const endpoints = type === 'manga'
    ? [`https://api.jikan.moe/v4/manga?q=${encodeURIComponent(query)}&limit=1`,
       `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=1`]
    : [`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=1`,
       `https://api.jikan.moe/v4/manga?q=${encodeURIComponent(query)}&limit=1`];

  for (const url of endpoints) {
    try {
      const res = await fetch(url);
      if (!res.ok) { await sleep(1000); continue; }
      const data = await res.json();
      const img = data.data?.[0]?.images?.jpg?.large_image_url
               || data.data?.[0]?.images?.jpg?.image_url;
      if (img) return img;
    } catch(e) {}
    await sleep(400);
  }
  return null;
}

async function processFetchQueue() {
  if (fetching) return;
  fetching = true;
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  const lbl  = document.getElementById('progressLabel');
  wrap.classList.add('visible');

  while (fetchQueue.length > 0) {
    const item = fetchQueue.shift();
    if (item.image) { fetchedCount++; bar.style.width = (fetchedCount / totalToFetch * 100) + '%'; continue; }
    lbl.textContent = `Chargement des covers… ${fetchedCount + 1} / ${totalToFetch}`;
    const img = await fetchCover(item.query || item.title, item.type || 'anime');
    if (img) { item.image = img; save(); updateCardImage(item.id, img); }
    else { setCardNoImage(item.id); }
    fetchedCount++;
    bar.style.width = (fetchedCount / totalToFetch * 100) + '%';
    if (fetchQueue.length > 0) await sleep(450);
  }

  bar.style.width = '100%';
  lbl.textContent = `✓ Toutes les covers chargées`;
  setTimeout(() => { wrap.classList.remove('visible'); lbl.textContent = ''; }, 2500);
  fetching = false;
}

function bindCardButtons(card, id) {
  card.querySelector('.ov-btn.photo').onclick = e => { e.stopPropagation(); openPhoto(id); };
  card.querySelector('.ov-btn.del').onclick   = e => { e.stopPropagation(); del(id); };
}

function updateCardImage(id, src) {
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (!card) return;
  card.querySelector('.card-img').innerHTML = `
    <img src="${src}" alt="">
    <div class="card-overlay">
      <button class="ov-btn photo" title="Photo">✎</button>
      <button class="ov-btn del" title="Supprimer">✕</button>
    </div>`;
  bindCardButtons(card, id);
}

function setCardNoImage(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (!card) return;
  const ph = card.querySelector('.placeholder');
  if (ph) ph.classList.add('no-image');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const list = q ? lib.filter(i => i.title.toLowerCase().includes(q)) : lib;
  document.getElementById('total').textContent = lib.length;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!list.length) { grid.innerHTML = '<div class="empty">Aucune œuvre trouvée</div>'; return; }

  fetchQueue = []; fetchedCount = 0;

  list.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;
    card.style.animationDelay = Math.min(idx * 0.01, 0.5) + 's';

    const overlay = `<div class="card-overlay">
      <button class="ov-btn photo" title="Photo">✎</button>
      <button class="ov-btn del" title="Supprimer">✕</button>
    </div>`;

    if (item.image) {
      card.innerHTML = `
        <div class="card-img"><img src="${item.image}" alt="">${overlay}</div>
        <div class="card-info"><div class="card-title">${item.title}</div></div>`;
    } else {
      card.innerHTML = `
        <div class="card-img">
          <div class="placeholder">
            <div class="spin">◌</div>
            <div class="ph-icon">◎</div>
            <div class="ph-text">Introuvable</div>
          </div>
          ${overlay}
        </div>
        <div class="card-info"><div class="card-title">${item.title}</div></div>`;
      fetchQueue.push(item);
    }

    bindCardButtons(card, item.id);
    grid.appendChild(card);
  });

  totalToFetch = fetchQueue.length;
  if (totalToFetch > 0) processFetchQueue();
}

function del(id) { lib = lib.filter(i => i.id !== id); save(); render(); }

function openPhoto(id) {
  photoTarget = id; pendingFile = null;
  document.getElementById('photoUrl').value = '';
  document.getElementById('photoModal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Add
document.getElementById('openAdd').onclick = () => {
  document.getElementById('newTitle').value = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('newTitle').focus(), 50);
};
document.getElementById('cancelAdd').onclick = () => closeModal('addModal');
document.getElementById('addModal').onclick = e => { if (e.target.id === 'addModal') closeModal('addModal'); };
document.getElementById('newTitle').onkeydown = e => { if (e.key === 'Enter') document.getElementById('confirmAdd').click(); };
document.getElementById('confirmAdd').onclick = () => {
  const t = document.getElementById('newTitle').value.trim();
  if (!t) return;
  lib.push({ id: nextId++, title: t, query: t, type: 'anime', image: null });
  save(); render(); closeModal('addModal');
};

// Photo
document.getElementById('cancelPhoto').onclick = () => closeModal('photoModal');
document.getElementById('photoModal').onclick = e => { if (e.target.id === 'photoModal') closeModal('photoModal'); };
document.getElementById('triggerFile').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { pendingFile = ev.target.result; document.getElementById('photoUrl').value = '(fichier sélectionné)'; };
  r.readAsDataURL(f); e.target.value = '';
};
document.getElementById('confirmPhoto').onclick = () => {
  const url = document.getElementById('photoUrl').value.trim();
  const src = pendingFile || (url && !url.includes('(fichier') ? url : null);
  if (!src) return;
  const item = lib.find(i => i.id === photoTarget);
  if (item) { item.image = src; save(); render(); }
  closeModal('photoModal');
};

document.getElementById('search').oninput = render;

load(); render();
</script>
</body>
</html>
