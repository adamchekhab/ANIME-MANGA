<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.06);
    --accent: #e8c97e;
    --accent2: #c4a55a;
    --text: #e8e6e0;
    --muted: #6b6a72;
    --tag-anime: rgba(232,201,126,0.12);
    --tag-manga: rgba(180,140,200,0.12);
    --tag-film: rgba(130,200,180,0.12);
    --tag-anime-c: #e8c97e;
    --tag-manga-c: #c4a0e0;
    --tag-film-c: #7ecfbb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background subtle texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(232,201,126,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(100,80,160,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
  }

  .title-block h1 span {
    color: var(--accent);
  }

  .title-block p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 16px 11px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 300;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: rgba(232,201,126,0.3); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .filter-btns {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--border); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 500; }

  .add-btn {
    background: transparent;
    border: 1px solid rgba(232,201,126,0.4);
    color: var(--accent);
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .add-btn:hover { background: rgba(232,201,126,0.08); border-color: var(--accent); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    padding-bottom: 80px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(232,201,126,0.2);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .card:hover .card-img img { transform: scale(1.04); }

  .card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--surface2) 0%, #12121c 100%);
  }

  .card-img-placeholder .icon { font-size: 1.8rem; opacity: 0.3; }

  /* Card overlay on hover */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-overlay { opacity: 1; }

  .overlay-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    backdrop-filter: blur(4px);
  }

  .overlay-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }
  .overlay-btn.del:hover { background: rgba(220,60,60,0.2); border-color: rgba(220,60,60,0.4); color: #f87171; }
  .overlay-btn.photo:hover { background: rgba(232,201,126,0.15); border-color: rgba(232,201,126,0.4); color: var(--accent); }

  .card-info {
    padding: 12px;
  }

  .card-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 6px;
  }

  .card-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tag-anime { background: var(--tag-anime); color: var(--tag-anime-c); }
  .tag-manga { background: var(--tag-manga); color: var(--tag-manga-c); }
  .tag-film  { background: var(--tag-film);  color: var(--tag-film-c); }

  /* Multiple tags */
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }

  /* MODAL */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-bg.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    width: 100%;
    max-width: 420px;
    transform: translateY(12px);
    transition: transform 0.2s;
  }

  .modal-bg.open .modal { transform: translateY(0); }

  .modal h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text);
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 300;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .field input:focus, .field select:focus { border-color: rgba(232,201,126,0.3); }
  .field select option { background: var(--surface2); }

  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text);
    cursor: pointer;
  }

  .checkbox-group input[type="checkbox"] {
    width: auto;
    padding: 0;
    accent-color: var(--accent);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-confirm {
    flex: 1;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-confirm:hover { background: var(--accent2); }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 11px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

  /* Empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty .big { font-size: 2rem; margin-bottom: 12px; opacity: 0.3; }
  .empty p { font-size: 0.875rem; }

  /* Divider count */
  .results-count {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* Hidden file input */
  #fileInput { display: none; }
</style>
</head>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="title-block">
        <h1>Ma <span>Bibliothèque</span></h1>
        <p>Animés · Mangas · Films</p>
      </div>
      <div class="header-stats">
        <div class="stat">
          <div class="stat-num" id="totalCount">0</div>
          <div class="stat-label">Œuvres</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="animeCount">0</div>
          <div class="stat-label">Animés</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="mangaCount">0</div>
          <div class="stat-label">Mangas</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="filmCount">0</div>
          <div class="stat-label">Films</div>
        </div>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Rechercher une œuvre…">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">Tout</button>
      <button class="filter-btn" data-filter="Animé">Animé</button>
      <button class="filter-btn" data-filter="Manga">Manga</button>
      <button class="filter-btn" data-filter="Film">Film</button>
    </div>
    <button class="add-btn" id="openAddModal">＋ Ajouter</button>
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Ajouter une œuvre</h2>
    <div class="field">
      <label>Titre</label>
      <input type="text" id="inputTitle" placeholder="Ex: Attack on Titan">
    </div>
    <div class="field">
      <label>Type(s)</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="type" value="Animé"> Animé</label>
        <label><input type="checkbox" name="type" value="Manga"> Manga</label>
        <label><input type="checkbox" name="type" value="Film"> Film</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelModal">Annuler</button>
      <button class="btn-confirm" id="confirmModal">Ajouter</button>
    </div>
  </div>
</div>

<!-- Photo Modal -->
<div class="modal-bg" id="photoModal">
  <div class="modal">
    <h2>Changer la photo</h2>
    <div class="field">
      <label>URL de l'image</label>
      <input type="text" id="photoUrl" placeholder="https://…">
    </div>
    <p style="text-align:center; color: var(--muted); font-size:0.8rem; margin: 8px 0;">— ou —</p>
    <div style="text-align:center;">
      <button class="add-btn" id="triggerFileInput" style="margin:0 auto; justify-content:center;">📁 Choisir un fichier</button>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelPhotoModal">Annuler</button>
      <button class="btn-confirm" id="confirmPhotoModal">Appliquer</button>
    </div>
  </div>
</div>

  {title:"Zankyou no Terror", types:["Animé"]},
].map((item, i) => ({...item, id: i+1, image: null}));

let library = [];
let nextId = 1;
let currentFilter = 'all';
let editingPhotoId = null;
let editingCardId = null;
let pendingFileData = null;

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      library = parsed.library || defaultData;
      nextId = parsed.nextId || (library.length + 1);
    } else {
      library = defaultData;
      nextId = library.length + 1;
    }
  } catch(e) {
    library = defaultData;
    nextId = library.length + 1;
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ library, nextId }));
}

function getTagClass(type) {
  if (type === 'Animé') return 'tag-anime';
  if (type === 'Manga') return 'tag-manga';
  if (type === 'Film') return 'tag-film';
  return 'tag-anime';
}

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  let filtered = library.filter(item => {
    const matchSearch = item.title.toLowerCase().includes(search);
    const matchFilter = currentFilter === 'all' || item.types.includes(currentFilter);
    return matchSearch && matchFilter;
  });

  // Stats
  document.getElementById('totalCount').textContent = library.length;
  document.getElementById('animeCount').textContent = library.filter(i => i.types.includes('Animé')).length;
  document.getElementById('mangaCount').textContent = library.filter(i => i.types.includes('Manga')).length;
  document.getElementById('filmCount').textContent = library.filter(i => i.types.includes('Film')).length;

  document.getElementById('resultsCount').textContent = filtered.length === library.length
    ? `${library.length} œuvres`
    : `${filtered.length} résultat${filtered.length > 1 ? 's' : ''}`;

  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="big">◌</div><p>Aucune œuvre trouvée</p></div>`;
    return;
  }

  filtered.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (idx * 0.02) + 's';

    const imgContent = item.image
      ? `<img src="${item.image}" alt="${item.title}">`
      : `<div class="card-img-placeholder"><div class="icon">◎</div><span>Ajouter une image</span></div>`;

    const tags = item.types.map(t =>
      `<span class="card-tag ${getTagClass(t)}">${t}</span>`
    ).join('');

    card.innerHTML = `
      <div class="card-img">
        ${imgContent}
        <div class="card-overlay">
          <button class="overlay-btn photo" title="Changer la photo" data-id="${item.id}">✎</button>
          <button class="overlay-btn del" title="Supprimer" data-id="${item.id}">✕</button>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${item.title}</div>
        <div class="tags">${tags}</div>
      </div>
    `;

    card.querySelector('.overlay-btn.photo').addEventListener('click', e => {
      e.stopPropagation();
      openPhotoModal(item.id);
    });

    card.querySelector('.overlay-btn.del').addEventListener('click', e => {
      e.stopPropagation();
      deleteItem(item.id);
    });

    grid.appendChild(card);
  });
}

function deleteItem(id) {
  library = library.filter(i => i.id !== id);
  save();
  render();
}

// ---- ADD MODAL ----
const modal = document.getElementById('modal');
const inputTitle = document.getElementById('inputTitle');

document.getElementById('openAddModal').addEventListener('click', () => {
  editingCardId = null;
  document.getElementById('modalTitle').textContent = 'Ajouter une œuvre';
  document.getElementById('confirmModal').textContent = 'Ajouter';
  inputTitle.value = '';
  document.querySelectorAll('input[name="type"]').forEach(c => c.checked = false);
  modal.classList.add('open');
  inputTitle.focus();
});

document.getElementById('cancelModal').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if(e.target === modal) modal.classList.remove('open'); });

document.getElementById('confirmModal').addEventListener('click', () => {
  const title = inputTitle.value.trim();
  const types = [...document.querySelectorAll('input[name="type"]:checked')].map(c => c.value);
  if (!title) { inputTitle.focus(); return; }
  if (types.length === 0) { alert('Sélectionnez au moins un type.'); return; }

  library.push({ id: nextId++, title, types, image: null });
  save();
  modal.classList.remove('open');
  render();
});

// ---- PHOTO MODAL ----
const photoModal = document.getElementById('photoModal');

function openPhotoModal(id) {
  editingPhotoId = id;
  pendingFileData = null;
  document.getElementById('photoUrl').value = '';
  photoModal.classList.add('open');
}

document.getElementById('cancelPhotoModal').addEventListener('click', () => photoModal.classList.remove('open'));
photoModal.addEventListener('click', e => { if(e.target === photoModal) photoModal.classList.remove('open'); });

document.getElementById('triggerFileInput').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingFileData = ev.target.result;
    document.getElementById('photoUrl').value = '(fichier local sélectionné)';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

document.getElementById('confirmPhotoModal').addEventListener('click', () => {
  const url = document.getElementById('photoUrl').value.trim();
  const imgSrc = pendingFileData || (url && !url.includes('(fichier') ? url : null);
  if (!imgSrc) { alert('Entrez une URL ou choisissez un fichier.'); return; }

  const item = library.find(i => i.id === editingPhotoId);
  if (item) { item.image = imgSrc; save(); render(); }
  photoModal.classList.remove('open');
});

// ---- FILTERS & SEARCH ----
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', render);

// ---- INIT ----
load();
render();
</script>
</body>
</html>
